# Spectral Atlas for Quiescent Galaxies
# Source: Hamadouche et al. (2026), arXiv:2603.13479
# https://arxiv.org/abs/2603.13479
#
# This YAML file contains rest-frame optical to NIR spectral features
# for interpreting quiescent galaxy spectra.
#
# All wavelengths are in Angstroms (vacuum).
#
# Diagnostic codes:
#   - age: stellar population age
#   - Z/H: metallicity
#   - α/Fe: alpha enhancement
#   - surface gravity: IMF sensitivity (dwarf/giant ratio)
#   - T_eff: effective temperature (stellar)
#   - T_e: electron temperature (gas)
#   - gas density: gas density diagnostic
#   - high-ionization: high ionization state indicator
#   - SFR: star formation rate
#   - N_HI: neutral hydrogen column
#   - M_BH: black hole mass
#
# Source codes:
#   - stellar: stellar photosphere
#   - ISM: interstellar medium
#   - AGN: active galactic nucleus
#
# Nucleosynthetic channels:
#   - BBN: Big Bang nucleosynthesis
#   - CCSNe: core-collapse supernovae (>8 M_sun)
#   - SNeIa: Type Ia supernovae
#   - AGB: asymptotic giant branch stars
#
# Notes:
#   a) Lick index measuring abundance of main absorber
#   b) Formerly Fe4668, renamed C2 4668 (carbon-sensitive)
#   c) Blend of Ti I, Ba I, Fe I, Ca I at ~6500 Å
#   d) Broad molecular bandhead feature
#   e) Na I doublet (5889, 5896 Å), ISM outflow contribution
#   f) CN2 Lick index definition avoiding Hδ
#   g) Mgb complex - Mg I triplet lines
#   h) G-band blend (CH, Fe, Ca)
#   i) High-ionization AGN/starburst lines
#   j) Mn I from explosive Si burning in CCSNe
#   k) Elements formed in massive stars, released via CCSNe
#   l) Type Ia from thermonuclear WD explosions
#   m) Surface gravity traces dwarf/giant ratio (IMF)
#   iv) FeH Wing-Ford band (9850-10200 Å)
#   vi) CN blend with TiO, ZrO
#   vii) NIR He I triplet (10832.1, 10833.2, 10833.3 Å)
#   viii) Na I 0.82µm blend with TiO bandhead

metadata:
  title: "A Spectral Atlas for Quiescent Galaxies"
  authors:
    - Massissilia L. Hamadouche
    - Jacqueline Antwi-Danso
    - Aliza Beverage
    - Katherine E. Whitaker
  year: 2026
  arxiv_id: "2603.13479"
  wavelength_range:
    min: 3000  # Å
    max: 20000  # Å
  description: |
    Reference table of spectral absorption and emission features
    in rest-frame optical to NIR spectra of quiescent galaxies.
    Includes physical origins, nucleosynthetic channels, and
    diagnostic utility for stellar population studies.

