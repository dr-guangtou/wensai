# Footnote definitions
footnotes:
  a: "Lick index measuring abundance of main absorber"
  b: "Formerly Fe4668, renamed C2 4668 (carbon-sensitive)"
  c: "Blend of Ti I, Ba I, Fe I, Ca I at ~6500 Å"
  d: "Broad molecular bandhead feature"
  e: "Na I doublet (5889, 5896 Å), ISM outflow contribution"
  f: "CN2 Lick index definition avoiding Hδ"
  g: "Mgb complex - Mg I triplet lines"
  h: "G-band blend (CH, Fe, Ca)"
  i: "High-ionization AGN/starburst lines or specific note"
  j: "Mn I from explosive Si burning in CCSNe"
  k: "Elements formed in massive stars, released via CCSNe"
  l: "Type Ia from thermonuclear WD explosions"
  m: "Surface gravity traces dwarf/giant ratio (IMF)"
  iv: "FeH Wing-Ford band (9850-10200 Å)"
  vi: "CN blend with TiO, ZrO"
  vii: "NIR He I triplet (10832.1, 10833.2, 10833.3 Å)"
  viii: "Na I 0.82µm blend with TiO bandhead"
  "8": "CLR = Coronal Line Region"

# Usage notes
usage_notes: |
  This atlas covers rest-frame 0.3-1.9 µm spectral features in quiescent galaxies.

  Key applications:
  - Stellar population age dating (Balmer/Paschen lines)
  - Metallicity measurements (Fe, Mg, Ca indices)
  - IMF constraints (surface gravity indicators)
  - α/Fe enhancement (Mg, Ca vs Fe indices)
  - AGB star diagnostics (TiO, VO, CN, CO)
  - AGN/ionized gas identification (emission lines)

  For JWST NIRSpec observations at z > 1, rest-optical features
  shift into observed NIR, making this atlas particularly valuable
  for high-redshift quiescent galaxy studies.

# Diagnostic summary
diagnostic_summary:
  age_tracers:
    - "Balmer series (Hα, Hβ, Hγ, Hδ)"
    - "Paschen series (Paα, Paβ, Paγ, etc.)"
    - "Balmer limit (H∞)"
    - "TiO bands (AGB stars)"

  metallicity_tracers:
    - "Fe I lines (Lick Fe indices)"
    - "Mg I/MgH (Mgb complex)"
    - "Ca II triplet"
    - "Na I doublet"

  alpha_enhancement:
    - "Mg indices vs Fe indices"
    - "Ca II vs Fe I"

  imf_surface_gravity:
    - "Na I 0.82 µm (dwarf-sensitive)"
    - "FeH Wing-Ford band (dwarf-sensitive)"
    - "Ca II triplet (giant-sensitive)"
    - "MgH (dwarf-sensitive)"

  agb_diagnostics:
    - "TiO bands (M-type AGB)"
    - "CN bands (C-type AGB)"
    - "VO bands (late M-type)"
    - "CO bands (C/O-rich AGB)"
